name: Validate PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-catalog:
    name: Validate catalog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Get changed agent and skill files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '^claude-catalog/(agents|skills)/.*\.md$' \
            | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Changed files: $FILES"

      - name: Run catalog validation
        id: validate
        run: |
          if [ -n "${{ steps.changed.outputs.files }}" ]; then
            python3 .github/scripts/validate_catalog.py \
              --changed-files ${{ steps.changed.outputs.files }} \
              --output-file /tmp/catalog-comment.md
          else
            python3 .github/scripts/validate_catalog.py \
              --output-file /tmp/catalog-comment.md
          fi
        continue-on-error: true

      - name: Post or update catalog comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- claude-catalog-validation -->';
            let body;
            try {
              body = fs.readFileSync('/tmp/catalog-comment.md', 'utf8');
            } catch {
              body = `${marker}\n## Catalog Validation Report\n\n⚠️ Could not read validation output.`;
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if catalog errors found
        if: steps.validate.outcome == 'failure'
        run: |
          echo "Catalog validation failed. Marketplace validation will not run."
          exit 1

  validate-marketplace:
    name: Validate marketplace
    runs-on: ubuntu-latest
    needs: validate-catalog

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run marketplace validation
        id: validate
        run: |
          python3 .github/scripts/validate_marketplace.py \
            --output-file /tmp/marketplace-comment.md
        continue-on-error: true

      - name: Post or update marketplace comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- claude-marketplace-validation -->';
            let body;
            try {
              body = fs.readFileSync('/tmp/marketplace-comment.md', 'utf8');
            } catch {
              body = `${marker}\n## Marketplace Validation Report\n\n⚠️ Could not read validation output.`;
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if marketplace errors found
        if: steps.validate.outcome == 'failure'
        run: |
          echo "Marketplace validation failed. See the PR comment for details."
          exit 1
